name: Random BMC Message (3 per hour - Eco Mode)

on:
  schedule:
    # 這裡代表：每小時的 07分、24分、46分 會各觸發一次
    # 看起來毫無規律，就像人類隨性發言，而且完全不燒額度！
    - cron: '7,24,46 * * * *'
  workflow_dispatch: # 保留手動觸發功能

jobs:
  send_message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Send Webhook (Instant)
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ ! -f messages.txt ]; then
            echo "Error: messages.txt not found!"
            exit 1
          fi

          # 隨機抽取一行
          RANDOM_LINE=$(grep -v '^$' messages.txt | shuf -n 1)
          
          if [ -z "$RANDOM_LINE" ]; then
            echo "Error: Picked an empty line!"
            exit 1
          fi

          NAME=$(echo "$RANDOM_LINE" | jq -r '.username')
          AVATAR=$(echo "$RANDOM_LINE" | jq -r '.avatar_url')
          MSG=$(echo "$RANDOM_LINE" | jq -r '.content')

          PAYLOAD=$(jq -n \
            --arg name "$NAME" \
            --arg avatar "$AVATAR" \
            --arg content "$MSG" \
            '{username: $name, avatar_url: $avatar, content: $content}')

          # 秒發秒關機，每次執行只要 5 秒鐘
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               -sS "$WEBHOOK_URL"
